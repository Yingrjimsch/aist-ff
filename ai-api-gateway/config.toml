# config.toml

# 1. Define the Providers
[[providers]]
id = "openai"
name = "OpenAI"
url = "https://api.openai.com/v1"

[[providers]]
id = "anthropic"
name = "Anthropic"
url = "https://api.anthropic.com/v1"


# 2. Define the Models
[[models]]
id = "gpt-4o"
name = "GPT-4o"

[[models]]
id = "claude-3-5"
name = "Claude 3.5 Sonnet"


# 3. The Intermediate Table / Many-to-Many Mapping
[[provider_models]]
provider_id = "openai"
model_id = "gpt-4o"

[[provider_models]]
provider_id = "anthropic"
model_id = "claude-3-5"

# If a model can be routed through multiple providers, you just add another link:
[[provider_models]]
provider_id = "openai"
model_id = "claude-3-5"  # (e.g., if OpenAI starts proxying it, or for demonstration)